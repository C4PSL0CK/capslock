# CAPSLock ArgoCD Application set
# Apply once: kubectl apply -f manifests/argocd-apps/argocd.yaml
# ArgoCD then keeps all components in sync with the git repo.

# ──────────────────────────────────────────────────────────────
# App-of-apps: drives the four per-component Applications below
# ──────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capslock-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/C4PSL0CK/capslock.git
    targetRevision: HEAD
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: capslock-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

