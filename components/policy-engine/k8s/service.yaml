apiVersion: v1
kind: Service
metadata:
  name: eape-service
  namespace: capslock-system
  labels:
    app: eape
    component: policy-engine
spec:
  type: ClusterIP
  selector:
    app: eape
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  sessionAffinity: None