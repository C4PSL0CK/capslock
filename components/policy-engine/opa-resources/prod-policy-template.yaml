apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
    name: eapeprodpolicy
    annotations:
        description: Production environment policy with strict restrictions and full compliance support
        eape.environment: prod
        eape.policy: prod-policy
        eape.version: "1.0"
spec:
    crd:
        spec:
            names:
                kind: EAPEProdPolicy
                plural: eapeprodpolicys
            validation:
                openAPIV3Schema:
                    type: object
                    properties:
                        maxFileSize:
                            type: string
                            description: Maximum file size for ICAP scanning
                        scanningMode:
                            type: string
                            description: 'Scanning mode: log-only, warn, or block'
    targets:
        - target: admission.k8s.gatekeeper.sh
          rego: |+
            package eapepolicy

            violation[{"msg": msg}] {
              container := input.review.object.spec.containers[_]
              not container.securityContext.runAsNonRoot
              msg := sprintf("Container %v must run as non-root user (block mode)", [container.name])
            }

            violation[{"msg": msg}] {
              container := input.review.object.spec.containers[_]
              container.resources.limits.ephemeral-storage
              exceeds_limit(container.resources.limits.ephemeral-storage, "25MB")
              msg := sprintf("Container %v exceeds maximum file size limit", [container.name])
            }

            exceeds_limit(value, limit) {
              # File size comparison logic would go here
              true
            }

            violation[{"msg": msg}] {
              not input.review.object.metadata.labels["data-classification"]
              msg := "Pod must have data-classification label (SOC2 requirement)"
            }

            violation[{"msg": msg}] {
              container := input.review.object.spec.containers[_]
              not container.securityContext.readOnlyRootFilesystem
              msg := sprintf("Container %v must have read-only root filesystem (PCI-DSS requirement)", [container.name])
            }

