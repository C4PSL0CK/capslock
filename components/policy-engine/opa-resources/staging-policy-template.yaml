apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
    name: eapestagingpolicy
    annotations:
        description: Staging environment policy with moderate restrictions and compliance testing
        eape.environment: staging
        eape.policy: staging-policy
        eape.version: "1.0"
spec:
    crd:
        spec:
            names:
                kind: EAPEStagingPolicy
                plural: eapestagingpolicys
            validation:
                openAPIV3Schema:
                    type: object
                    properties:
                        maxFileSize:
                            type: string
                            description: Maximum file size for ICAP scanning
                        scanningMode:
                            type: string
                            description: 'Scanning mode: log-only, warn, or block'
    targets:
        - target: admission.k8s.gatekeeper.sh
          rego: |+
            package eapepolicy

            warn[{"msg": msg}] {
              container := input.review.object.spec.containers[_]
              not container.securityContext.runAsNonRoot
              msg := sprintf("Container %v should run as non-root user (warn mode)", [container.name])
            }

            violation[{"msg": msg}] {
              container := input.review.object.spec.containers[_]
              container.resources.limits.ephemeral-storage
              exceeds_limit(container.resources.limits.ephemeral-storage, "50MB")
              msg := sprintf("Container %v exceeds maximum file size limit", [container.name])
            }

            exceeds_limit(value, limit) {
              # File size comparison logic would go here
              true
            }

            violation[{"msg": msg}] {
              not input.review.object.metadata.labels["data-classification"]
              msg := "Pod must have data-classification label (SOC2 requirement)"
            }

