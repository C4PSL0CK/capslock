# Production Environment Policy Template
name: "prod-policy"
description: "Maximum security policy for production environments - strict enforcement"
version: "1.0.0"
environment: "prod"
target_environment: "prod"
risk_level: "low"  # Low risk because of strict controls

enforcement:
  mode: "strict"  # Production uses strict mode

# Pod Security Configuration - MAXIMUM SECURITY
pod_security:
  standard: "restricted"  # Restricted Pod Security Standard
  allow_privileged: false
  allow_host_network: false
  allow_host_pid: false
  allow_host_ipc: false
  allow_host_path: false
  require_run_as_non_root: true
  require_read_only_root: true
  require_drop_all: true
  allowed_capabilities: []  # NO additional capabilities allowed
  require_seccomp_profile: true
  require_apparmor_profile: true

# RBAC Configuration - LEAST PRIVILEGE
rbac:
  allow_cluster_admin: false
  allow_wildcard_permissions: false
  require_dedicated_sa: true
  disable_auto_mount: true

# Network Configuration - FULL SEGMENTATION
network:
  require_network_policies: true
  require_default_deny: true
  allow_external_egress: false  # Restrict external access in prod

# Secrets Configuration - MAXIMUM PROTECTION
secrets:
  allow_secrets_as_env_vars: false        # NO env vars allowed
  require_external_secrets_manager: true  # MUST use external manager
  require_encryption_at_rest: true        # MUST encrypt at rest

# Resources Configuration - FULL RESOURCE MANAGEMENT
resources:
  require_resource_quota: true
  require_limit_range: true
  require_resource_limits: true

# Compliance Configuration - ALL FRAMEWORKS
compliance:
  standards:
    - "cis"
    - "pci-dss"
  
  # ALL 28 CIS Kubernetes Benchmark checks MUST pass
  cis_controls:
    # Section 4.1 - RBAC and Service Accounts (8 checks)
    - "4.1.1"  # Ensure cluster-admin role only used where required
    - "4.1.2"  # Minimize access to secrets
    - "4.1.3"  # Minimize wildcard use in Roles
    - "4.1.4"  # Minimize access to create pods
    - "4.1.5"  # Ensure default service accounts not actively used
    - "4.1.6"  # Ensure SA tokens only mounted where necessary
    - "4.1.7"  # Avoid use of system:masters group
    - "4.1.8"  # Limit use of Bind, Impersonate, Escalate
    
    # Section 4.2 - Pod Security Standards (12 checks)
    - "4.2.1"   # Minimize admission of privileged containers
    - "4.2.2"   # Minimize admission of containers with host path
    - "4.2.3"   # Minimize admission of containers with hostNetwork
    - "4.2.4"   # Minimize admission of containers with hostPID
    - "4.2.5"   # Minimize admission of containers with hostIPC
    - "4.2.6"   # Minimize admission with allowPrivilegeEscalation
    - "4.2.7"   # Minimize admission of root containers
    - "4.2.8"   # Minimize admission with NET_RAW capability
    - "4.2.9"   # Minimize admission with added capabilities
    - "4.2.10"  # Minimize admission with capabilities assigned
    - "4.2.11"  # Minimize admission of Windows HostProcess
    - "4.2.12"  # Minimize admission of HostPath volumes
    
    # Section 4.3 - Network Policies and CNI (3 checks)
    - "4.3.1"  # Ensure CNI supports NetworkPolicies
    - "4.3.2"  # Ensure all Namespaces have NetworkPolicies
    - "4.3.3"  # Use NetworkPolicies to deny traffic by default
    
    # Section 4.4 - Secrets Management (2 checks)
    - "4.4.1"  # Prefer Secrets as files over env variables
    - "4.4.2"  # Consider external secret storage
    
    # Section 4.5 - Namespace Configuration (3 checks)
    - "4.5.1"  # Ensure default namespace not used
    - "4.5.2"  # Ensure namespace ResourceQuotas in place
    - "4.5.3"  # Ensure namespace LimitRanges in place
  
  # ALL applicable PCI-DSS v4.0 requirements
  pci_dss_requirements:
    - "1.2.1"   # Requirement 1: Network security controls configured
    - "2.2.2"   # Requirement 2: Default accounts managed
    - "2.2.4"   # Requirement 2: Security parameters configured
    - "3.4.1"   # Requirement 3: Data encrypted at rest
    - "3.5.1"   # Requirement 3: Cryptographic keys managed
    - "3.6.1"   # Requirement 3: Key storage procedures
    - "4.2.1"   # Requirement 4: Strong cryptography in transit
    - "5.3.2"   # Requirement 5: Anti-malware active
    - "6.3.2"   # Requirement 6: Software inventory maintained
    - "7.1.1"   # Requirement 7: Access control systems configured
    - "7.2.2"   # Requirement 7: Access by job function
    - "8.2.1"   # Requirement 8: Strong authentication
    - "8.6.1"   # Requirement 8: System accounts managed
    - "10.2.1"  # Requirement 10: Audit logs for anomaly detection
    - "10.3.4"  # Requirement 10: Audit logs protected
    - "11.4.2"  # Requirement 11: Intrusion detection/prevention