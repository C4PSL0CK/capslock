name: staging-policy
version: "1.0"
environment: staging
description: Staging environment policy with moderate restrictions and compliance testing

icapConfig:
  scanningMode: warn
  maxFileSize: 50MB
  virusScanConfig:
    enabled: true
    engine: clamav
    action: warn
  contentFilterConfig:
    enabled: true
    blockedTypes:
      - "application/x-msdownload"
      - "application/x-executable"
    sensitiveDataScanning: true

performanceConfig:
  timeout: 20
  maxConcurrent: 8
  previewSize: 512

complianceConfig:
  standards:
    - iso27001
    - soc2
  requirements:
    - "ISO 27001: Malware detection and warnings"
    - "SOC 2: Audit logging for testing compliance"
  controls:
    encryption: recommended
    auditLogging: required
    accessControl: recommended
    malwareScanning: required
    dataProtection: recommended
    sensitiveDataScanning: true