# Development Environment Policy Template
name: "dev-policy"
description: "Security policy for development environments - relaxed but secure"
version: "1.0.0"
environment: "dev"
target_environment: "dev"
risk_level: "medium"

enforcement:
  mode: "audit"  # Development uses audit mode for flexibility

# Pod Security Configuration
pod_security:
  standard: "baseline"  # Baseline for dev (not restricted)
  allow_privileged: false
  allow_host_network: false
  allow_host_pid: false
  allow_host_ipc: false
  allow_host_path: false
  require_run_as_non_root: false  # Not enforced in dev
  require_read_only_root: false   # Not enforced in dev
  require_drop_all: false         # Not enforced in dev
  allowed_capabilities:
    - "NET_BIND_SERVICE"  # Allow binding to privileged ports for testing
  require_seccomp_profile: false
  require_apparmor_profile: false

# RBAC Configuration
rbac:
  allow_cluster_admin: false
  allow_wildcard_permissions: true  # Allow for dev flexibility
  require_dedicated_sa: false       # Not required in dev
  disable_auto_mount: false         # Allow auto-mount in dev

# Network Configuration
network:
  require_network_policies: false  # Not required in dev
  require_default_deny: false
  allow_external_egress: true      # Allow external access for dev

# Secrets Configuration
secrets:
  allow_secrets_as_env_vars: true        # Allow env vars in dev
  require_external_secrets_manager: false # Not required in dev
  require_encryption_at_rest: false      # Not required in dev

# Resources Configuration
resources:
  require_resource_quota: false   # Not required in dev
  require_limit_range: false      # Not required in dev
  require_resource_limits: false  # Not required in dev

# Compliance Configuration
compliance:
  standards:
    - "cis"  # Only CIS for dev, not PCI-DSS
  cis_controls:
    # Section 4.1 - RBAC (8 checks) - Partial compliance
    - "4.1.1"  # Cluster-admin restriction
    - "4.1.2"  # Secrets access minimization
    - "4.1.5"  # Default SA not actively used
    
    # Section 4.2 - Pod Security (12 checks) - Partial compliance
    - "4.2.1"  # No privileged containers
    - "4.2.3"  # No hostNetwork
    - "4.2.4"  # No hostPID
    - "4.2.5"  # No hostIPC
    
    # Section 4.3 - Network (3 checks) - Not enforced in dev
    
    # Section 4.4 - Secrets (2 checks) - Not enforced in dev
    
    # Section 4.5 - Namespace (3 checks) - Partial compliance
    - "4.5.1"  # Default namespace not used
  
  pci_dss_requirements: []  # No PCI-DSS in dev